# Build, test & deploy Maths Suite to GitHub Pages.
#   - Tests run on every push to main AND on pull requests (so they gate PR #…).
#   - Build + deploy only run on main / manual dispatch, and only after tests pass.

name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:          # allows manual runs from the GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Serialise per ref: a newer commit on the same branch/PR cancels the older run,
# but PR runs never cancel a main deploy (and vice versa).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Test ─────────────────────────────────────────────────────────────────
  # Generator correctness harness (test/*.mjs). Gates build + deploy.
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Run test suite
        run: node --test   # no deps needed — pure ESM + node:test built-in

  # ── 2. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build bundle
    needs: test                                   # only build if tests pass
    if: github.event_name != 'pull_request'       # don't build/deploy PRs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run esbuild
        run: bash build.sh

      - name: Remove node_modules before packaging
        run: rm -rf node_modules   # not needed at runtime; keeps artifact small

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # serve the whole repo root as-is

  # ── 3. Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
